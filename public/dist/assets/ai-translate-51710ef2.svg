<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon_grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feOffset dx="0" dy="2" in="blur" result="offsetBlur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="url(#icon_grad)" filter="url(#shadow)" />
  
  <!-- 翻译符号组合 (A + Sparkles) -->
  <g transform="translate(25, 25) scale(0.5)">
    <!-- 字母 A 的简约化 -->
    <path d="M50 15L15 85H28L36 65H64L72 85H85L50 15ZM50 35L60 55H40L50 35Z" fill="white" />
    
    <!-- AI 星光图标 (Sparkles) -->
    <path d="M85 15C85 15 85 25 75 25C85 25 85 35 85 35C85 35 85 25 95 25C85 25 85 15 85 15Z" fill="white" />
    <path d="M70 40C70 40 70 46 64 46C70 46 70 52 70 52C70 52 70 46 76 46C70 46 70 40 70 40Z" fill="white" />
  </g>
  
  <!-- 底部装饰弧线 -->
  <path d="M30 75C40 82 60 82 70 75" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5" />
</svg>